name: NexusForge Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install scanner
        run: |
          cd packages/scanner
          bun install
          bun run build

      - name: Run security scan
        run: |
          node packages/scanner/dist/index.js audit \
            --path . \
            --format sarif \
            --output security-results.sarif \
            --include-dev

      - name: Generate Markdown report
        run: |
          node packages/scanner/dist/index.js audit \
            --path . \
            --format markdown \
            --output security-report.md \
            --include-dev

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: security-results.sarif
          category: nexusforge-scanner

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: security-report.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-report.md', 'utf-8');
            const summary = report.split('## Vulnerabilities')[0];
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ⚡ NexusForge Security Scan\n\n${summary}\n\n<details><summary>Full Report</summary>\n\n${report}\n</details>`
            });