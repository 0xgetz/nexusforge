version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "0xgetz"
    assignees:
      - "0xgetz"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    versioning-strategy: increase

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "0xgetz"
    assignees:
      - "0xgetz"
    labels:
      - "dependencies"
      - "ci/cd"
    commit-message:
      prefix: "chore(actions)"
